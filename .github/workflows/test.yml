name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Pandoc
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Install Pandoc (Windows)
        if: runner.os == 'Windows'
        run: choco install pandoc --yes --no-progress
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Compile
        run: python -m compileall -q src
      - name: Test
        run: python -m unittest discover -s tests -v

  gui-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[gui]"
      - name: Import and construct GUI
        shell: powershell
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -c "from PySide6.QtWidgets import QApplication; from mathfixer.gui import MainWindow; app=QApplication([]); window=MainWindow(); print(window.windowTitle())"
