name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Pandoc
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Install Pandoc (Windows)
        if: runner.os == 'Windows'
        run: choco install pandoc --yes --no-progress
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Compile
        run: python -m compileall -q src
      - name: Test
        run: python -m unittest discover -s tests -v

  gui-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Pandoc
        run: choco install pandoc --yes --no-progress
      - run: pip install -e ".[gui]"
      - name: Convert a real DOCX through the GUI worker
        shell: powershell
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python tests/gui_smoke.py

  frozen-exe-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Pandoc
        run: choco install pandoc --yes --no-progress
      - name: Build frozen GUI executable
        shell: powershell
        run: .\scripts\build_windows.ps1 -Python python
      - name: Convert a real DOCX with the frozen EXE
        shell: powershell
        run: |
          python tests\smoke_document.py smoke-input.docx
          $inputPath = (Resolve-Path smoke-input.docx).Path
          $outputPath = Join-Path $PWD "smoke-output.docx"
          $process = Start-Process -FilePath "dist\MathFixer.exe" -ArgumentList @("--self-test", $inputPath, $outputPath) -PassThru
          if (-not $process.WaitForExit(45000)) {
            Stop-Process -Id $process.Id -Force
            throw "Frozen MathFixer.exe exceeded the 45-second conversion smoke limit."
          }
          if ($process.ExitCode -ne 0 -or -not (Test-Path $outputPath)) {
            $errorPath = [IO.Path]::ChangeExtension($outputPath, ".error.txt")
            if (Test-Path $errorPath) { Get-Content $errorPath }
            throw "Frozen MathFixer.exe could not convert a real DOCX with embedded Pandoc."
          }
