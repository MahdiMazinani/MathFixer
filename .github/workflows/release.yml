name: build-windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches:
      - "release-v*"

permissions:
  contents: read

jobs:
  windows-portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Pandoc
        run: choco install pandoc --yes --no-progress
      - name: Install and test package
        run: |
          python -m pip install -e ".[dev]"
          ruff check .
          python -m unittest discover -s tests -v
      - name: Build self-contained executable
        shell: powershell
        run: .\scripts\build_windows.ps1 -Python python
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
      - name: Build installer and sign when a certificate is configured
        shell: powershell
        env:
          MATHFIXER_CERTIFICATE_BASE64: ${{ secrets.MATHFIXER_CERTIFICATE_BASE64 }}
          MATHFIXER_CERTIFICATE_PASSWORD: ${{ secrets.MATHFIXER_CERTIFICATE_PASSWORD }}
        run: |
          $certificate = ""
          if (-not [string]::IsNullOrWhiteSpace($env:MATHFIXER_CERTIFICATE_BASE64)) {
            $certificate = Join-Path $env:RUNNER_TEMP "mathfixer-signing.pfx"
            [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:MATHFIXER_CERTIFICATE_BASE64))
          }
          $version = $env:GITHUB_REF_NAME -replace '^release-v', '' -replace '^v', ''
          .\scripts\build_installer.ps1 -Version $version -CertificatePath $certificate -CertificatePassword $env:MATHFIXER_CERTIFICATE_PASSWORD
      - name: Package beginner download
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path package -Force | Out-Null
          Copy-Item dist\MathFixer.exe package\MathFixer.exe
          Copy-Item THIRD_PARTY_NOTICES.md package\THIRD_PARTY_NOTICES.md
          Copy-Item docs\BEGINNER_GUIDE_FA.html package\راهنمای-فارسی.html
          Copy-Item docs\BEGINNER_GUIDE.html package\BEGINNER_GUIDE.html
          Copy-Item docs\guide-fa.css package\guide-fa.css
          Copy-Item docs\guide-en.css package\guide-en.css
          Copy-Item CHANGELOG.md package\CHANGELOG.md
          Copy-Item README.md package\README.md
          Copy-Item README_FA.md package\README_FA.md
          Copy-Item examples package\examples -Recurse
          Compress-Archive -Path package\* -DestinationPath MathFixer-Windows-Portable.zip -Force
          Copy-Item dist\MathFixer-Setup.exe MathFixer-Setup.exe
          $checksums = @(
            (Get-FileHash MathFixer-Windows-Portable.zip -Algorithm SHA256).Hash.ToLower() + "  MathFixer-Windows-Portable.zip"
            (Get-FileHash MathFixer-Setup.exe -Algorithm SHA256).Hash.ToLower() + "  MathFixer-Setup.exe"
          )
          $checksums | Set-Content SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: MathFixer-Windows-Portable
          path: |
            MathFixer-Windows-Portable.zip
            MathFixer-Setup.exe
            SHA256SUMS.txt

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/release-v')
    needs: windows-portable
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: MathFixer-Windows-Portable
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$GITHUB_REF_NAME"
          TAG="${TAG#release-}"
          gh release create "$TAG" MathFixer-Windows-Portable.zip MathFixer-Setup.exe SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "MathFixer $TAG" \
            --generate-notes
